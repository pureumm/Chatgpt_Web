<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT 웹페이지 만들기</title>

  <link rel="stylesheet" href="https://s3.ap-northeast-2.amazonaws.com/materials.spartacodingclub.kr/easygpt/default.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    .hero {
      background-color: #212529;
      color: white;
      padding: 100px 20px;
      text-align: center;
    }

    /* 이미지 크기 통일 */
    .card-img-top {
      height: 250px;
      object-fit: cover;
      transition: transform 0.4s ease; /* 부드러운 확대 */
    }

    /* 카드 hover 효과 */
    .card {
      overflow: hidden; /* 확대 시 튀어나오는 부분 숨김 */
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05); /* 카드 전체 확대 */
    }

    /* 이미지도 살짝 더 확대 */
    .card:hover .card-img-top {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <!-- Hero 영역 -->
  <div class="hero">
    <h1>pureum 사진공유 페이지</h1>
    <p class="lead">사진을 공유합니다</p>
  </div>

  <!-- 구성요소 -->
  <div class="container mt-5">
    <div class="row">

      <!-- 카드 1 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.pexels.com/photos/417173/pexels-photo-417173.jpeg" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">노을이 아름다운 바다</h5>
            <h6 class="card-subtitle mb-2 text-muted">여행 사진</h6>
            <p class="card-text">붉게 물든 하늘과 바다가 어우러진 감성적인 풍경입니다.</p>
          </div>
        </div>
      </div>

      <!-- 카드 2 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.pexels.com/photos/34950/pexels-photo.jpg" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">산 속의 평온한 풍경</h5>
            <h6 class="card-subtitle mb-2 text-muted">자연 사진</h6>
            <p class="card-text">푸른 산과 맑은 공기가 느껴지는 평온한 자연의 모습입니다.</p>
          </div>
        </div>
      </div>

      <!-- 카드 3 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.pexels.com/photos/33109/fall-autumn-red-season.jpg" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">가을의 따뜻한 색감</h5>
            <h6 class="card-subtitle mb-2 text-muted">풍경 사진</h6>
            <p class="card-text">알록달록한 단풍이 만들어내는 따뜻한 분위기의 사진입니다.</p>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
